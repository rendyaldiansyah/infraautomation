name: LKS 2026 — CI/CD Pipeline (3-Hour + Prometheus)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION:          ${{ secrets.AWS_REGION }}
  MONITORING_REGION:   ${{ secrets.MONITORING_REGION }}
  ECR_REGISTRY:        ${{ secrets.ECR_REGISTRY }}
  ECR_REGISTRY_OREGON: ${{ secrets.ECR_REGISTRY_OREGON }}

# ═══════════════════════════════════════════════════════════
#  JOB 1 — install
#  Install dependencies and run tests for all services.
# ═══════════════════════════════════════════════════════════
jobs:
  install:
    name: Install & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install & test frontend
        working-directory: frontend
        run: npm install && npm test

      - name: Install & test API
        working-directory: api
        run: npm install && npm test

# ═══════════════════════════════════════════════════════════
#  JOB 2 — build_and_push_ecr
#  Build 3 Docker images and push to ECR:
#    lks-fe-app      → ECR us-east-1  (Frontend)
#    lks-api-app     → ECR us-east-1  (API)
#    lks-prometheus  → ECR us-west-2  (Prometheus with baked-in config)
#
#  NOTE: ECR repos must be created MANUALLY before this runs.
#  See module Section 8 and SETUP.md Step 5.
# ═══════════════════════════════════════════════════════════
  build_and_push_ecr:
    name: Build & Push to ECR (both regions)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to ECR us-east-1
        run: |
          aws ecr get-login-password --region us-east-1 \
            | docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Login to ECR us-west-2
        run: |
          aws ecr get-login-password --region us-west-2 \
            | docker login --username AWS --password-stdin $ECR_REGISTRY_OREGON

      # ── Application images → ECR us-east-1 ─────────────
      - name: Build & push — Frontend
        env: { IMAGE_TAG: "${{ github.sha }}" }
        run: |
          IMG="$ECR_REGISTRY/lks-fe-app"
          docker build -t "$IMG:$IMAGE_TAG" -t "$IMG:latest" ./frontend
          docker push "$IMG:$IMAGE_TAG" && docker push "$IMG:latest"
          echo "Pushed FE: $IMG:$IMAGE_TAG"

      - name: Build & push — API
        env: { IMAGE_TAG: "${{ github.sha }}" }
        run: |
          IMG="$ECR_REGISTRY/lks-api-app"
          docker build -t "$IMG:$IMAGE_TAG" -t "$IMG:latest" ./api
          docker push "$IMG:$IMAGE_TAG" && docker push "$IMG:latest"
          echo "Pushed API: $IMG:$IMAGE_TAG"

      # ── Prometheus image → ECR us-west-2 ───────────────
      # The Dockerfile in monitoring/ bakes prometheus.yml + rules into the image.
      # When you update ECS task IPs in prometheus.yml and push to GitHub,
      # this job automatically rebuilds and pushes the new config image.
      - name: Build & push — Prometheus (us-west-2)
        env: { IMAGE_TAG: "${{ github.sha }}" }
        run: |
          IMG="$ECR_REGISTRY_OREGON/lks-prometheus"
          docker build -t "$IMG:$IMAGE_TAG" -t "$IMG:latest" ./monitoring
          docker push "$IMG:$IMAGE_TAG" && docker push "$IMG:latest"
          echo "Pushed Prometheus: $IMG:$IMAGE_TAG"

      - name: Save image tag
        run: echo "${{ github.sha }}" > /tmp/image-tag.txt

      - uses: actions/upload-artifact@v4
        with: { name: image-tag, path: /tmp/image-tag.txt }

# ═══════════════════════════════════════════════════════════
#  JOB 3 — upload_to_s3
#  Upload prometheus config and deployment metadata to S3.
# ═══════════════════════════════════════════════════════════
  upload_to_s3:
    name: Upload Config to S3
    runs-on: ubuntu-latest
    needs: build_and_push_ecr
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Sync Prometheus config to S3
        run: |
          aws s3 sync ./monitoring/prometheus \
            s3://${{ secrets.TF_STATE_BUCKET }}/prometheus-config/ \
            --delete --sse AES256
          echo "Prometheus config synced to S3"

      - name: Upload deployment metadata
        run: |
          echo "{
            \"commit\":    \"${{ github.sha }}\",
            \"actor\":     \"${{ github.actor }}\",
            \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
            \"images\": {
              \"frontend\":   \"$ECR_REGISTRY/lks-fe-app:${{ github.sha }}\",
              \"api\":        \"$ECR_REGISTRY/lks-api-app:${{ github.sha }}\",
              \"prometheus\": \"$ECR_REGISTRY_OREGON/lks-prometheus:${{ github.sha }}\"
            },
            \"notes\": \"ECS and ECR created manually. Terraform deploys infra only.\"
          }" > /tmp/meta.json
          aws s3 cp /tmp/meta.json \
            s3://${{ secrets.TF_STATE_BUCKET }}/deployments/${{ github.sha }}.json

# ═══════════════════════════════════════════════════════════
#  JOB 4 — deploy
#  Terraform deploys all AWS infrastructure EXCEPT ECS and ECR.
#
#  Terraform manages:
#    VPC (us-east-1), Monitoring VPC (us-west-2),
#    VPC Peering (inter-region), Security Groups,
#    ALB + Target Groups, RDS, DynamoDB, S3, SSM, CloudWatch
#
#  After this job:
#    1. Create ECS app cluster in us-east-1 (manual, AWS Console)
#    2. Create ECS monitoring cluster in us-west-2 (manual, AWS Console)
#    3. Get ECS task IPs, update prometheus.yml, push again
# ═══════════════════════════════════════════════════════════
  deploy:
    name: Terraform Deploy (infrastructure)
    runs-on: ubuntu-latest
    needs: upload_to_s3
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "~1.8" }

      - uses: actions/download-artifact@v4
        with: { name: image-tag, path: /tmp }

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=prod/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}"

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}" \
            -var="student_name=${{ secrets.STUDENT_NAME }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Show outputs & next steps
        working-directory: terraform
        run: |
          echo "============================================================"
          echo " Terraform apply complete — infrastructure is ready"
          echo "============================================================"
          terraform output -json \
            | jq -r 'to_entries[] | "\(.key):\n  \(.value.value // "(sensitive)")\n"' \
            || true
          echo ""
          echo "============================================================"
          echo " NEXT STEPS (manual — not automated by Terraform):"
          echo "============================================================"
          echo ""
          echo " 1. Create ECS cluster lks-ecs-cluster in us-east-1"
          echo "    Use private_subnet_ids and sg_ecs_id from outputs above"
          echo ""
          echo " 2. Create ECS cluster lks-monitoring-cluster in us-west-2"
          echo "    Use monitoring_subnet_ids and sg_monitoring_id from above"
          echo ""
          echo " 3. Deploy Prometheus ECS service in lks-monitoring-cluster"
          echo "    Image: $ECR_REGISTRY_OREGON/lks-prometheus:$(cat /tmp/image-tag.txt)"
          echo ""
          echo " 4. Get ECS app task private IPs:"
          echo "    aws ecs describe-tasks --cluster lks-ecs-cluster --region us-east-1 ..."
          echo ""
          echo " 5. Update monitoring/prometheus/prometheus.yml with real IPs"
          echo "    Then push to GitHub to rebuild the Prometheus image"
